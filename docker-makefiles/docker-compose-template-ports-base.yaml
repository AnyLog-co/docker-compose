services:
  ${NODE_NAME}-init:
    image: busybox
    user: root
    group_add:
      - ${DOCKER_GID}
    command: [
      "sh", "-c",
      "chown -R 10001:10001 
        /app/AnyLog-Network/anylog 
        /app/AnyLog-Network/blockchain 
        /app/AnyLog-Network/data 
        /app/deployment-scripts
      "
    ]
    restart: "no"
    volumes:
      - ${NODE_NAME}-anylog:/app/AnyLog-Network/anylog
      - ${NODE_NAME}-blockchain:/app/AnyLog-Network/blockchain
      - ${NODE_NAME}-data:/app/AnyLog-Network/data
      - ${NODE_NAME}-local-scripts:/app/deployment-scripts
      - ${DOCKER_SOCKET}:/var/run/docker.sock
  ${NODE_NAME}:
    image: ${IMAGE}:${TAG}
    user: "anylog:anylog"
    group_add:
      - ${DOCKER_GID}
    platform: ${DOCKER_PLATFORM}
    restart: always
    env_file:
    container_name: ${NODE_NAME}
    stdin_open: true
    tty: true
    ports:
      - ${ANYLOG_SERVER_PORT}:${ANYLOG_SERVER_PORT}
      - ${ANYLOG_REST_PORT}:${ANYLOG_REST_PORT}
    volumes:
      - ${NODE_NAME}-anylog:/app/AnyLog-Network/anylog
      - ${NODE_NAME}-blockchain:/app/AnyLog-Network/blockchain
      - ${NODE_NAME}-data:/app/AnyLog-Network/data
      - ${NODE_NAME}-local-scripts:/app/deployment-scripts
      - ${DOCKER_SOCKET}:/var/run/docker.sock
volumes:
  ${NODE_NAME}-anylog:
  ${NODE_NAME}-blockchain:
  ${NODE_NAME}-data:
  ${NODE_NAME}-local-scripts:
