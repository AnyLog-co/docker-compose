services:
  edgex-operator3:
    image: anylogco/anylog-network:1.4.2510-beta8
    restart: always
    env_file:
      -  ../../docker-makefiles/edgex-operator3/base_configs.env
      - ../../docker-makefiles/edgex-operator3/advance_configs.env
      - ../../docker-makefiles/edgex-operator3/.env
    container_name: edgex-operator3
    stdin_open: true
    tty: true
    network_mode: host
    volumes:
      - edgex-operator3-anylog:/app/AnyLog-Network/anylog
      - edgex-operator3-blockchain:/app/AnyLog-Network/blockchain
      - edgex-operator3-data:/app/AnyLog-Network/data
      - edgex-operator3-local-scripts:/app/deployment-scripts
      - /var/run/docker.sock:/var/run/docker.sock
volumes:
  edgex-operator3-anylog:
  edgex-operator3-blockchain:
  edgex-operator3-data:
  edgex-operator3-local-scripts:
